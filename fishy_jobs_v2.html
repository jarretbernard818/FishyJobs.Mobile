  .sidebar {

// Scene color index → actual color
const SCENE_COLORS = ['#2a9e50','#3a9fd5','#d4572a','#8a4adc','#c8921a','#2abfbf','#7a8a9a'];

let currentEp = 0;

function renderVal(vals) {
  let html = '';
  vals.forEach(v => {
    if(Array.isArray(v) && v.length===2 && typeof v[0]==='string' && typeof v[1]==='string') {
      html += `<span class="badge b-${v[0]}">${v[0]}</span>${v[1]}`;
    } else { html += v; }
  });
  return html;
}

function toggleCard(id) {
  document.getElementById('cb-'+id).classList.toggle('open');
  document.getElementById('ch-'+id).classList.toggle('open');
}

function openSidebar() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sidebar').classList.add('open');
}
function closeSidebar() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
}

function selectEpisode(idx) {
  currentEp = idx;
  const ep = EPISODES[idx];
  const c = EP_COLORS[idx];
  document.querySelectorAll('.sidebar-ep').forEach((el,i) => el.classList.toggle('active', i===idx));
  document.getElementById('picker-dot').style.background = c.dot;
  document.getElementById('picker-label').textContent = `EP ${ep.id} — ${ep.title}`;
  document.querySelectorAll('.ep-view').forEach((el,i) => el.classList.toggle('active', i===idx));
  // reset to outline
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="outline"]').classList.add('active');
  document.querySelectorAll('.ep-view.active .panel').forEach(p => p.classList.remove('active'));
  const op = document.getElementById(`panel-outline-${idx}`);
  if(op) op.classList.add('active');
  closeSidebar();
  window.scrollTo(0,0);
}

function switchTab(name, el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if(el) el.classList.add('active');
  const view = document.getElementById('ep-view-'+currentEp);
  if(!view) return;
  view.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const t = view.querySelector('#panel-'+name+'-'+currentEp);
  if(t) t.classList.add('active');
  window.scrollTo(0,0);
}

// Build sidebar
function buildSidebar() {
  const list = document.getElementById('sidebar-list');
  EPISODES.forEach((ep,i) => {
    const c = EP_COLORS[i];
    const div = document.createElement('div');
    div.className = 'sidebar-ep'+(i===0?' active':'');
    div.id = 'sidebar-ep-'+i;
    div.onclick = () => selectEpisode(i);
    div.innerHTML = `
      <div class="sidebar-ep-badge" style="background:${c.dot}">EP${ep.id}</div>
      <div class="sidebar-ep-info">
        <div class="sidebar-ep-title">${ep.title}</div>
        <div class="sidebar-ep-meta">${ep.runtime}</div>
      </div>
      <div class="sidebar-ep-check">✓</div>`;
    list.appendChild(div);
  });
}

// Build all episodes
function buildAll() {
  const app = document.getElementById('app');
  EPISODES.forEach((ep,ei) => {
    const c = EP_COLORS[ei];
    const view = document.createElement('div');
    view.className = 'ep-view'+(ei===0?' active':'');
    view.id = 'ep-view-'+ei;

    // Header
    const hdr = document.createElement('header');
    hdr.style.background = c.bg;
    hdr.innerHTML = `
      <div class="ep-header-badge" style="background:${c.light};color:${c.accent}">
        Fishy Jobs · S1 · EP ${ep.id}
      </div>
      <div class="ep-title" style="color:${c.accent}">${ep.title}</div>
      <div class="ep-theme" style="color:${c.accent}">${ep.theme}</div>
      <div class="ep-meta">${ep.pills.map(p=>`<span class="meta-pill">${p}</span>`).join('')}</div>`;
    view.appendChild(hdr);

    // Timeline
    const tlW = document.createElement('div');
    tlW.className = 'timeline-wrap';
    const tlB = document.createElement('div');
    tlB.className = 'timeline-bar';
    ep.durations.forEach((d,i) => {
      const s = document.createElement('div');
      s.className = 'tl-seg';
      s.style.cssText = `flex:${d};background:${SCENE_COLORS[ep.scenes[i].ci]};opacity:0.75;`;
      tlB.appendChild(s);
    });
    tlW.appendChild(tlB);
    tlW.innerHTML += `<div class="tl-labels"><span class="tl-label">0:00</span><span class="tl-label">${ep.runtime}</span></div>`;
    view.appendChild(tlW);

    // OUTLINE
    const pOut = document.createElement('div');
    pOut.className = 'panel active';
    pOut.id = `panel-outline-${ei}`;
    let oh = '<div class="section-label">Scenes</div>';
    ep.scenes.forEach((s,si) => {
      const uid = `${ei}-${si}`;
      const rh = s.rows.map(([k,...v]) =>
        `<div class="row"><div class="row-key">${k}</div><div class="row-val">${renderVal(v)}</div></div>`
      ).join('');
      oh += `<div class="card">
        <div class="card-header" onclick="toggleCard('${uid}')">
          <span class="seg-num">${s.num}</span>
          <span class="seg-tag ${s.tc}">${s.tag}</span>
          <div class="card-title-wrap">
            <div class="seg-title">${s.title}</div>
            <div class="seg-time">${s.time} · ${s.dur}</div>
          </div>
          <span class="chevron" id="ch-${uid}">▶</span>
        </div>
        <div class="card-body" id="cb-${uid}">${rh}</div>
      </div>`;
    });
    pOut.innerHTML = oh;
    view.appendChild(pOut);

    // SCRIPT
    const pScr = document.createElement('div');
    pScr.className = 'panel';
    pScr.id = `panel-script-${ei}`;
    let sh = '';
    ep.script.forEach(block => {
      const lh = block.lines.map(l => l.d
        ? `<span class="direction">${l.d}</span>`
        : `<p>${l.t.replace(/\n/g,'<br>')}</p>`
      ).join('');
      sh += `<div class="section-label">${block.label}</div>
        <div class="script-box" style="border-left-color:${c.accent}">${lh}</div>`;
    });
    pScr.innerHTML = sh;
    view.appendChild(pScr);

    // QUESTIONS
    const pQ = document.createElement('div');
    pQ.className = 'panel';
    pQ.id = `panel-questions-${ei}`;
    pQ.innerHTML = ep.questions.map(cat => `
      <div class="faq-section">
        <div class="faq-cat" style="color:${c.accent}">${cat.cat}</div>
        ${cat.qs.map(q=>`<div class="faq-item">
          <div class="faq-dot" style="background:${c.dot}"></div>
          <div class="faq-text">${q}</div>
        </div>`).join('')}
      </div>`).join('');
    view.appendChild(pQ);

    // SHOTS
    const pSh = document.createElement('div');
    pSh.className = 'panel';
    pSh.id = `panel-shots-${ei}`;
    pSh.innerHTML = ep.shots.map(cat => `
      <div class="shot-card">
        <div class="shot-cat">${cat.cat}</div>
        ${cat.items.map(it=>`<div class="shot-item">
          <span class="shot-dot" style="background:${c.dot}"></span>${it}
        </div>`).join('')}
      </div>`).join('');
    view.appendChild(pSh);

    // FORMULA
    const pF = document.createElement('div');
    pF.className = 'panel';
    pF.id = `panel-formula-${ei}`;
    const arcH = ep.arc.map((s,i) => {
      const hl = ep.arcHl.includes(i);
      const arr = i<ep.arc.length-1 ? '<div class="arc-arrow">→</div>' : '';
      return `<div class="arc-step${hl?' hl':''}" style="${hl?`background:${c.dot}`:''}">${s}</div>${arr}`;
    }).join('');
    const formH = ep.formula.map((f,fi) => `
      <div class="formula-card">
        <div class="formula-num" style="color:${c.dot}">${String(fi+1).padStart(2,'0')}</div>
        <div><div class="formula-title">${f.t}</div><div class="formula-desc">${f.d}</div></div>
      </div>`).join('');
    const toneH = ep.tone.map(t =>
      `<span class="tone-pill" style="background:${c.light};color:${c.accent};border:1px solid ${c.dot}44">${t}</span>`
    ).join('');
    pF.innerHTML = `
      <div class="section-label">Story Arc</div>
      <div class="arc-wrap">${arcH}</div>
      <div class="section-label" style="margin-top:20px">Episode Steps</div>
      ${formH}
      <div class="section-label">Tone</div>
      <div class="tone-wrap">${toneH}</div>`;
    view.appendChild(pF);

    app.appendChild(view);

    // open first scene
    setTimeout(() => {
      const b = document.getElementById(`cb-${ei}-0`);
      const ch = document.getElementById(`ch-${ei}-0`);
      if(b) b.classList.add('open');
      if(ch) ch.classList.add('open');
    }, 30);
  });
}

buildSidebar();
buildAll();
</script>
</body>
</html>
